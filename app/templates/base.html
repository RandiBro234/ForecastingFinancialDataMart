<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Financial Dashboard</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-chart-line"></i>
            <span>FinForecast</span>
        </div>
        
        <ul class="nav-menu">
            <li>
                <a href="/" class="nav-link {% if page == 'dashboard' %}active{% endif %}">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/forecast-result" class="nav-link {% if page == 'forecast_result' %}active{% endif %}">
                    <i class="fa-solid fa-chart-area"></i>
                    <span>Forecast Result</span>
                </a>
            </li>
            <li>
                <a href="/model-evaluation" class="nav-link {% if page == 'model_evaluation' %}active{% endif %}">
                    <i class="fa-solid fa-ranking-star"></i>
                    <span>Model Evaluation</span>
                </a>
            </li>
            <li>
                <a href="/data-diagnostics" class="nav-link {% if page == 'data_diagnostics' %}active{% endif %}">
                    <i class="fa-solid fa-stethoscope"></i>
                    <span>Data Diagnostics</span>
                </a>
            </li>
            <li>
                <a href="/data-warehouse" class="nav-link {% if page == 'data_warehouse' %}active{% endif %}">
                    <i class="fa-solid fa-database"></i>
                    <span>Data Warehouse</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title">{{ title }}</h1>
            <p class="page-subtitle">{% block subtitle %}Overview of the financial data mart.{% endblock %}</p>
        </header>

        {% block content %}{% endblock %}
    </main>

    <!-- Custom Scripts -->
    <script src="/static/js/charts.js"></script>
</body>
</html>
